# Music venue configuration for What's Playing
#
# Each venue entry requires:
#   name:     Display name for the venue
#   url:      URL of the events/calendar page to scrape
#   strategy: "json-ld" (default) or "css"
#
# JSON-LD strategy (strategy: json-ld)
#   Automatically extracts Event/MusicEvent structured data embedded in the page.
#   Most modern venue sites include this. No extra fields needed.
#   Falls back to CSS selectors if json-ld yields nothing and selectors are provided.
#
# CSS selector strategy (strategy: css)
#   Use when the site doesn't have JSON-LD structured data.
#   Required:  event_selector  — CSS selector matching each event block
#   Optional:  title_selector, date_selector, url_selector,
#              description_selector, price_selector, image_selector
#              (all relative to each event block)
#   Optional:  base_url — used to resolve relative URLs (defaults to 'url')
#
# Examples:
#
# venues:
#   - name: "The Fillmore"
#     url: "https://www.thefillmore.com/events/"
#     strategy: json-ld
#
#   - name: "My Local Venue"
#     url: "https://mylocalvenue.com/shows"
#     strategy: css
#     event_selector: ".event-listing"
#     title_selector: ".event-title"
#     date_selector: ".event-date"
#     url_selector: "a"
#     description_selector: ".event-description"
#     price_selector: ".ticket-price"
#     image_selector: "img"
#     base_url: "https://mylocalvenue.com"

venues:
  - name: Cafe Ornithology
    url: https://cafeornithology.com/brooklyn-bushwick-williamsburg-cafe-ornithology-events
    strategy: css
    event_selector: div.event-content
    title_selector: h2
    date_selector: .event-day
    time_selector: .event-time
    description_selector: .event-info-text
  - name: Ornithology Jazz Club
    url: https://ornithologyjazzclub.com/brooklyn-bushwick-williamsburg-ornithology-jazz-club-events
    strategy: css
    event_selector: div.event-content
    title_selector: h2
    date_selector: .event-day
    time_selector: .event-time
    description_selector: .event-info-text
  - name: Fred's Dog House
    url: https://www.fredsdoghouse.com/live-music/
    strategy: css
    event_selector: li.card
    title_selector: .card__heading
    date_selector: .card__heading
    url_selector: a.card__btn
    base_url: https://www.fredsdoghouse.com
  - name: Lucinda's
    url: https://www.lucindasnyc.com/calendar/
    strategy: css
    event_selector: div.tw-cal-event
    title_selector: .tw-name a
    date_selector: .tw-event-date-complete
    url_selector: .tw-name a
    image_selector: .tw-image img
    base_url: https://www.lucindasnyc.com
  - name: Sunny's Bar
    url: https://www.sunnysredhook.com/calendar2/
    strategy: tockify
    tockify_calendar: sunnysmusic
  - name: Brooklyn Paramount
    url: https://www.brooklynparamount.com/shows
    strategy: json-ld
  - name: Freddy's
    url: https://www.freddysbar.com/events
    strategy: css
    event_selector: div.eventlist-column-info
    title_selector: .eventlist-title
    date_selector: .eventlist-meta-item
    url_selector: a.eventlist-title-link
    base_url: https://www.freddysbar.com
  - name: Jalopy Theatre
    url: https://jalopytheatre.netlify.app/performances
    strategy: viewcy
    viewcy_org: jalopytheatre
    viewcy_category: '360'
